version: '3'

vars:
  # Last commit that contains the original bash yadm; the differential
  # compatibility tests run radm side-by-side against this exact script.
  YADM_REF: bbb58e6
  VERSION:
    sh: cargo pkgid | sed 's/.*#//'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the debug binary
    cmds:
      - cargo build

  build:release:
    desc: Build the optimized release binary
    cmds:
      - cargo build --release

  fmt:
    desc: Format the source tree
    cmds:
      - cargo fmt

  fmt:check:
    desc: Verify formatting
    cmds:
      - cargo fmt --check

  lint:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test

  test:compat:
    desc: Differential compatibility tests against the original bash yadm
    cmds:
      - mkdir -p .cache
      - git cat-file blob {{.YADM_REF}}:yadm > .cache/yadm-ref
      - chmod +x .cache/yadm-ref
      - RADM_COMPAT_YADM="$PWD/.cache/yadm-ref" cargo test --test compat_yadm -- --nocapture

  ci:
    desc: Everything the CI runs
    cmds:
      - task: fmt:check
      - task: lint
      - task: build
      - task: test
      - task: test:compat

  install:
    desc: Install radm to the cargo bin directory
    cmds:
      - cargo install --path . --locked

  release:
    desc: 'Tag and publish a GitHub release with a macOS arm64 binary (usage: task release)'
    deps: [build:release]
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: 'Working tree is dirty; commit or stash first'
    cmds:
      - mkdir -p dist
      - tar -czf dist/radm-{{.VERSION}}-aarch64-apple-darwin.tar.gz -C target/release radm
      - shasum -a 256 dist/radm-{{.VERSION}}-aarch64-apple-darwin.tar.gz > dist/radm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256
      - gh release create v{{.VERSION}} dist/radm-{{.VERSION}}-aarch64-apple-darwin.tar.gz dist/radm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256 --title "radm v{{.VERSION}}" --generate-notes
