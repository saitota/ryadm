version: '3'

vars:
  # Last commit holding the original bash yadm; test:compat diffs against it.
  YADM_REF: bbb58e6
  REPO: saitota/ryadm

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the debug binary
    cmds:
      - cargo build

  build:release:
    desc: Build the optimized release binary
    cmds:
      - cargo build --release

  fmt:
    desc: Format the source tree
    cmds:
      - cargo fmt

  fmt:check:
    desc: Verify formatting
    cmds:
      - cargo fmt --check

  lint:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test

  test:compat:
    desc: Differential compatibility tests against the original bash yadm
    cmds:
      - mkdir -p .cache
      - git cat-file blob {{.YADM_REF}}:yadm > .cache/yadm-ref
      - chmod +x .cache/yadm-ref
      - RYADM_COMPAT_YADM="$PWD/.cache/yadm-ref" cargo test --test compat_yadm -- --nocapture

  ci:
    desc: Everything the CI runs
    cmds:
      - task: fmt:check
      - task: lint
      - task: build
      - task: test
      - task: test:compat

  install:
    desc: Install ryadm to the cargo bin directory
    cmds:
      - cargo install --path . --locked

  version-bump:
    desc: 'Open a PR bumping Cargo.toml to the next patch (or VERSION=1.2.0). Merge it, then run `task release`.'
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: 'Working tree is dirty; commit or stash first'
    vars:
      # Patch-bump whichever is higher: latest GitHub tag or Cargo.toml.
      VERSION:
        sh: |
          if [ -n "{{.VERSION}}" ]; then echo "{{.VERSION}}"; exit; fi
          latest=$(gh release list --repo {{.REPO}} --limit 100 --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//')
          manifest=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          highest=$(printf '%s\n%s\n' "$latest" "$manifest" | sort -V | tail -1)
          echo "$highest" | awk -F. '{printf "%s.%s.%d\n", $1, $2, $3+1}'
      BRANCH: bump-v{{.VERSION}}
    cmds:
      - git switch -c {{.BRANCH}}
      - sed -i '' 's/^version = ".*"/version = "{{.VERSION}}"/' Cargo.toml
      - cargo build --quiet
      - git add Cargo.toml Cargo.lock
      - git commit -m "Bump version to {{.VERSION}}"
      - git push -u origin {{.BRANCH}}
      - gh pr create --repo {{.REPO}} --assignee @me --title "Bump version to {{.VERSION}}" --body "Version bump to {{.VERSION}}. Merge, then run \`task release\`." --base main --head {{.BRANCH}}
      - git switch main

  release:
    desc: 'From main, publish the Cargo.toml version to crates.io and cut the matching GitHub release. Bump first with `task version-bump`.'
    vars:
      VERSION:
        sh: sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1
      TAG: v{{.VERSION}}
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: 'Working tree is dirty; commit or stash first'
      - sh: '[ "$(git rev-parse --abbrev-ref HEAD)" = "main" ]'
        msg: 'Run release from an up-to-date main (merge the version bump PR first)'
      - sh: '! gh release view {{.TAG}} --repo {{.REPO}} >/dev/null 2>&1'
        msg: 'Release {{.TAG}} already exists; run `task version-bump` to bump first'
    cmds:
      - RYADM_VERSION={{.TAG}} cargo build --release
      - '[ "$(./target/release/ryadm version | head -1)" = "ryadm version {{.VERSION}}" ]'
      # crates.io is irreversible, so publish before touching GitHub.
      - cargo publish
      - mkdir -p dist
      - tar -czf dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz -C target/release ryadm
      - shasum -a 256 dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz > dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256
      - gh release create {{.TAG}} dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256 --repo {{.REPO}} --title "ryadm {{.TAG}}" --target $(git rev-parse HEAD) --generate-notes
      - git fetch origin tag {{.TAG}}
