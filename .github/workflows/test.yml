name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          # full history: the differential compat tests extract the original
          # bash yadm from a pinned commit with `git cat-file`
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI suite
        run: task ci
