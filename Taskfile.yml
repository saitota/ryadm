version: '3'

vars:
  # Last commit that contains the original bash yadm; the differential
  # compatibility tests run ryadm side-by-side against this exact script.
  YADM_REF: bbb58e6
  REPO: saitota/ryadm

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the debug binary
    cmds:
      - cargo build

  build:release:
    desc: Build the optimized release binary
    cmds:
      - cargo build --release

  fmt:
    desc: Format the source tree
    cmds:
      - cargo fmt

  fmt:check:
    desc: Verify formatting
    cmds:
      - cargo fmt --check

  lint:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy --all-targets -- -D warnings

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test

  test:compat:
    desc: Differential compatibility tests against the original bash yadm
    cmds:
      - mkdir -p .cache
      - git cat-file blob {{.YADM_REF}}:yadm > .cache/yadm-ref
      - chmod +x .cache/yadm-ref
      - RYADM_COMPAT_YADM="$PWD/.cache/yadm-ref" cargo test --test compat_yadm -- --nocapture

  ci:
    desc: Everything the CI runs
    cmds:
      - task: fmt:check
      - task: lint
      - task: build
      - task: test
      - task: test:compat

  install:
    desc: Install ryadm to the cargo bin directory
    cmds:
      - cargo install --path . --locked

  release:
    desc: 'Publish a GitHub release. Auto-bumps the patch of the latest vX.Y.Z; override with TAG=v1.2.0'
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: 'Working tree is dirty; commit or stash first'
    vars:
      # Latest release tag, then bump patch (v1.0.0 if none). TAG=... overrides.
      TAG:
        sh: |
          if [ -n "{{.TAG}}" ]; then echo "{{.TAG}}"; exit; fi
          latest=$(gh release list --repo {{.REPO}} --limit 100 --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$latest" ]; then echo "v1.0.0"; exit; fi
          echo "$latest" | awk -F. '{printf "%s.%s.%d\n", $1, $2, $3+1}'
      # SemVer form (no leading v) stamped into the binary and asset names.
      VERSION:
        sh: echo '{{.TAG}}' | sed 's/^v//'
    cmds:
      - RYADM_VERSION={{.TAG}} cargo build --release
      - '[ "$(./target/release/ryadm version | head -1)" = "ryadm version {{.VERSION}}" ]'
      - mkdir -p dist
      - tar -czf dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz -C target/release ryadm
      - shasum -a 256 dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz > dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256
      - gh release create {{.TAG}} dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz dist/ryadm-{{.VERSION}}-aarch64-apple-darwin.tar.gz.sha256 --repo {{.REPO}} --title "ryadm {{.TAG}}" --target $(git rev-parse HEAD) --generate-notes
      - git fetch origin tag {{.TAG}}
